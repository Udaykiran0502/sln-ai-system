name: SLN AI Core E2E CI

on:
  push:
    branches: [ master, dev, staging, production ]
  pull_request:
    branches: [ master, dev ]

jobs:
  backend-test:
    name: Backend Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfreetype6-dev libharfbuzz-dev libraqm-dev libcairo2-dev pkg-config

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest Suite
        run: |
          python -m pytest

  frontend-build:
    name: Frontend Linter & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend_react/package-lock.json

      - name: Install Dependencies
        working-directory: frontend_react
        run: npm ci

      - name: Run Build Compiler
        working-directory: frontend_react
        run: npm run build
